<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="docGrad" x1="8" y1="4" x2="44" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F8EF7"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="36" y1="30" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#1e3a5f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 文档主体（圆角矩形 + 折角） -->
  <g filter="url(#shadow)">
    <path d="M12 6 H36 L46 16 V54 C46 56.2 44.2 58 42 58 H12 C9.8 58 8 56.2 8 54 V10 C8 7.8 9.8 6 12 6Z" fill="url(#docGrad)"/>
    <!-- 折角 -->
    <path d="M36 6 L36 12 C36 14.2 37.8 16 40 16 H46" fill="#93BBFD"/>
  </g>

  <!-- 文档中的横线（代表文本行） -->
  <rect x="15" y="23" width="20" height="2.5" rx="1.25" fill="white" opacity="0.85"/>
  <rect x="15" y="30" width="16" height="2.5" rx="1.25" fill="white" opacity="0.65"/>
  <rect x="15" y="37" width="22" height="2.5" rx="1.25" fill="white" opacity="0.50"/>
  <rect x="15" y="44" width="14" height="2.5" rx="1.25" fill="white" opacity="0.40"/>

  <!-- 右下角对勾圆圈（检查通过标志） -->
  <circle cx="48" cy="46" r="13" fill="url(#checkGrad)" stroke="white" stroke-width="2.5"/>
  <path d="M41.5 46 L45.5 50 L54.5 41" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
